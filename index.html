<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #007bff;
        }

        h2 {
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="date"></h2>
        <h1>Welcome to Node.js App</h1>
    </div>

    <script>
        document.getElementById("date").innerHTML =
            "Today's date: " + new Date().toLocaleDateString();
    </script>

</body>
</html>
